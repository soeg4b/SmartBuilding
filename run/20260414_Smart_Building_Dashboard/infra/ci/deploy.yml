# =============================================================================
# Smart Building Dashboard — CD Pipeline
# GitHub Actions: Deploy to staging/production
# =============================================================================

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "=== Staging Deployment ==="
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest"
          echo ""
          echo "To deploy manually:"
          echo "  1. SSH into staging server"
          echo "  2. cd /opt/smart-building-dashboard"
          echo "  3. docker compose pull"
          echo "  4. docker compose up -d"
          echo "  5. docker compose exec backend npx prisma migrate deploy --schema=src/database/schema.prisma"
          echo ""
          echo "Configure STAGING_HOST, STAGING_USER, STAGING_SSH_KEY secrets"
          echo "in GitHub repository settings to enable automatic deployment."

      - name: Verify staging health
        if: vars.STAGING_URL != ''
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 12); do
            if curl -sf "${{ vars.STAGING_URL }}/api/v1/health" > /dev/null 2>&1; then
              echo "Staging is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "Warning: Staging health check did not pass within 120s"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy to Production (manual approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          echo "=== Production Deployment ==="
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest"
          echo ""
          echo "To deploy manually:"
          echo "  1. SSH into production server"
          echo "  2. cd /opt/smart-building-dashboard"
          echo "  3. docker compose pull"
          echo "  4. docker compose up -d --no-build"
          echo "  5. docker compose exec backend npx prisma migrate deploy --schema=src/database/schema.prisma"
          echo ""
          echo "Configure PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY secrets"
          echo "in GitHub repository settings to enable automatic deployment."

      - name: Verify production health
        if: vars.PRODUCTION_URL != ''
        run: |
          echo "Waiting for production to become healthy..."
          for i in $(seq 1 15); do
            if curl -sf "${{ vars.PRODUCTION_URL }}/api/v1/health" > /dev/null 2>&1; then
              echo "Production is healthy!"
              exit 0
            fi
            echo "Attempt $i/15 — waiting 10s..."
            sleep 10
          done
          echo "ERROR: Production health check failed after 150s"
          exit 1
