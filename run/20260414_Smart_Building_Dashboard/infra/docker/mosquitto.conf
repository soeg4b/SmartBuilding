# =============================================================================
# Eclipse Mosquitto MQTT Broker Configuration
# Smart Building Dashboard — IoT Sensor Data Ingestion
# =============================================================================

# --- Listener: MQTT (TCP) ---
listener 1883
protocol mqtt

# --- Listener: WebSocket ---
listener 9001
protocol websockets

# --- Authentication ---
# For development: allow anonymous connections
# For production: set to false and configure password_file
allow_anonymous true
# password_file /mosquitto/config/passwd

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Message size limits ---
message_size_limit 1048576

# --- Connection limits ---
max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# --- Keep-alive ---
max_keepalive 120
